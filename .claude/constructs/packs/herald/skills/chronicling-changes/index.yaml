name: chronicling-changes
slug: chronicling-changes
version: 1.0.0
description: >
  Research git history, PRs, and releases to produce a structured change timeline.
  Use when you need to understand what actually shipped, when, and what it did before
  drafting announcements. Outputs a chronicle artifact that grounding-announcements
  consumes.

model: native
color: blue

effort_hint: medium
danger_level: safe
categories:
  - communication
  - research

triggers:
  - "/chronicle"
  - "research changes"
  - "what shipped"
  - "build timeline"
  - "git history for announcement"

negative_triggers:
  - "write announcement"
  - "draft discord"

examples:
  - context: "User wants to know what changed before announcing"
    user_says: "Chronicle the arcade changes for the announcement"
    agent_action: "Research git log for arcade features, map commit dates, read components to describe what each feature did, output structured chronicle"

  - context: "User needs timeline of a specific feature"
    user_says: "When did vault ship and what did it actually do?"
    agent_action: "Search git log for vault commits, read vault components, output feature chronicle with dates and code-grounded descriptions"

domain_hints:
  - git
  - history
  - timeline
  - changelog
  - research
  - commits

entry: SKILL.md

capabilities:
  model_tier: sonnet
  danger_level: safe
  effort_hint: medium
  downgrade_allowed: true
  execution_hint: sequential
  requires:
    native_runtime: true
    tool_calling: true

allowed-tools:
  - Read
  - Glob
  - Grep
  - Bash
  - Task

dependencies:
  - artifact: ".git"
    required: true
    description: "Must be a git repository to research history"

outputs:
  - path: "grimoires/herald/chronicles/{feature}-chronicle.md"
    description: "Structured timeline with dates, descriptions, and code evidence"

events:
  emits:
    - name: "forge.herald.changes_chronicled"
      description: "Structured change timeline produced from git evidence"
