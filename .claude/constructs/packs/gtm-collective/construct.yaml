schema_version: 3
name: GTM Collective
slug: gtm-collective
version: 1.0.0
description: Go-To-Market skills and commands for product launches, positioning, and developer relations.
short_description: "Go-to-market operations"
domain:
  - marketing
author: 0xHoneyJar
license: MIT
visibility: public
skills:
  - slug: analyzing-market
    path: skills/analyzing-market/
  - slug: building-partnerships
    path: skills/building-partnerships/
  - slug: crafting-narratives
    path: skills/crafting-narratives/
  - slug: educating-developers
    path: skills/educating-developers/
  - slug: positioning-product
    path: skills/positioning-product/
  - slug: pricing-strategist
    path: skills/pricing-strategist/
  - slug: reviewing-gtm
    path: skills/reviewing-gtm/
  - slug: translating-for-stakeholders
    path: skills/translating-for-stakeholders/
commands:
  - name: analyze-market
    path: commands/analyze-market.md
  - name: announce-release
    path: commands/announce-release.md
  - name: create-deck
    path: commands/create-deck.md
  - name: plan-devrel
    path: commands/plan-devrel.md
  - name: plan-launch
    path: commands/plan-launch.md
  - name: plan-partnerships
    path: commands/plan-partnerships.md
  - name: position
    path: commands/position.md
  - name: price
    path: commands/price.md
  - name: sync-from-dev
    path: commands/sync-from-dev.md
  - name: gtm-adopt
    path: commands/gtm-adopt.md
  - name: gtm-feature-requests
    path: commands/gtm-feature-requests.md
  - name: gtm-setup
    path: commands/gtm-setup.md
  - name: review-gtm
    path: commands/review-gtm.md
  - name: sync-from-gtm
    path: commands/sync-from-gtm.md
repository:
  url: https://github.com/0xHoneyJar/construct-gtm-collective.git
  homepage: https://constructs.network/constructs/gtm-collective
events:
  emits:
    - type: forge.gtm.positioning_defined
      description: Emitted when product positioning is defined or updated
      data_schema:
        positioning_path: string
    - type: forge.gtm.launch_planned
      description: Emitted when a launch plan is created
      data_schema:
        plan_path: string
        launch_date: string
  consumes: []
compose_with:
  - observer
governed_by:
  - vocabulary-bank
capabilities:
  model_tier: sonnet
  danger_level: safe
  effort_hint: medium
  downgrade_allowed: true
  execution_hint: parallel
  requires:
    tool_calling: true
    thinking_traces: false
    vision: false
identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml
quick_start:
  command: /position
  description: define your product positioning
