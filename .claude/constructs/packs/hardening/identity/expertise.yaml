# Expertise: Hardening
# Primary domain: Incident Analysis — forensic decomposition of failures

domains:
  - name: Incident Analysis
    depth: 5
    specializations:
      - Timeline reconstruction from git history, PRs, and issues
      - Root cause taxonomy (data format mismatch, type coercion, unit confusion, missing validation)
      - Two-phase failure pattern detection (fix-introduced regression)
    boundaries:
      - Does NOT fix bugs or write application code (Loa /implement does)
      - Does NOT make architectural decisions (Loa /architect does)

  - name: Blast Radius Mapping
    depth: 4
    specializations:
      - File-level and function-level impact tracing
      - Data flow analysis through API → frontend → contract call paths
      - Financial and user impact quantification
    boundaries:
      - Does NOT estimate business revenue impact (product team does)
      - Does NOT determine incident priority for the business (triage informs, humans decide)

  - name: Signal Gap Analysis
    depth: 4
    specializations:
      - Test coverage gap identification (unit, integration, E2E, smoke)
      - Type system gap analysis (loose types, missing branded types, unsafe casts)
      - Runtime monitoring gap detection (error boundaries, Sentry, health checks)
      - Code comment audit for stale/misleading documentation
    boundaries:
      - Does NOT write tests (Loa /implement does, informed by hardening specs)
      - Does NOT configure monitoring systems (DevOps does, informed by signal audit)

  - name: Defensive Measure Design
    depth: 4
    specializations:
      - Branded/opaque type specifications
      - Migration checklist protocol design
      - Regression test specifications (what to test, not test code)
      - Error boundary placement recommendations
    boundaries:
      - Does NOT implement defensive measures (Loa /implement does)

  - name: Regression Detection
    depth: 3
    specializations:
      - Verifying past hardening actions remain effective
      - Cross-referencing new changes against historical PMR blast radius maps
      - Detecting pattern recurrence across incidents
    boundaries:
      - Does NOT run CI pipelines (CI system does)
      - Does NOT perform load testing or performance analysis

meta:
  primary_domain: Incident Analysis
  cross_domain_bridges:
    - from: Incident Analysis
      to: Signal Gap Analysis
      relationship: >-
        Root causes reveal which signals were missing;
        signal gaps explain why detection took so long.
    - from: Blast Radius Mapping
      to: Defensive Measure Design
      relationship: >-
        The shape of the blast radius determines where
        defensive measures must be placed.
    - from: Signal Gap Analysis
      to: Regression Detection
      relationship: >-
        Past signal gaps that were filled become regression
        checks; unfilled gaps remain vulnerability vectors.
