slug: patrol
name: "Autonomous Patrol"
version: 0.1.0

description: |
  Use this skill for autonomous, time-boxed observation cycles with ratcheting
  health score. The Karpathy Loop for network health — set it running, walk away,
  come back to a health trail.

triggers:
  - "/patrol"
  - "start patrol"
  - "autonomous observation"
  - "monitor the network"

entry: SKILL.md

capabilities:
  model_tier: sonnet
  danger_level: safe
  effort_hint: large
  downgrade_allowed: true
  execution_hint: sequential
  requires:
    tool_calling: true
    native_runtime: false
    thinking_traces: false
    vision: false

outputs:
  - path: "grimoires/gecko/observations.jsonl"
    description: "Append-only observation log"
  - path: "grimoires/gecko/patrol-state.json"
    description: "Patrol loop state for resume"
